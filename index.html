<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活メモ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FullCalendar CDN -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
        <div class="glass-card auth-card">
            <h1>就活メモ</h1>
            <p>サインインして専用ダッシュボードにアクセス</p>
            <form id="login-form">
                <div class="input-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>パスワード</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn primary">ログイン</button>
            </form>
            <div style="margin-top: 1rem; text-align: center; font-size: 0.8rem;">
                <a href="#" id="show-signup" style="color: #60a5fa;">新規アカウント作成（初回設定用）</a>
            </div>
            <div id="auth-warning" style="margin-top: 1rem; font-size: 0.75rem; color: var(--warning); text-align: center;">
                ※現在ローカルテストモード（MOCK）で動作しています。Firebaseのキーを設定するとクラウド同期が有効になります。
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-screen" class="screen">
        <nav class="navbar">
            <div class="logo">就活メモ</div>
            <button id="logout-btn" class="btn text">ログアウト</button>
        </nav>

        <div class="container">
            <!-- Format Generator Section -->
            <section class="glass-card format-section" style="margin-bottom: 24px;">
                <h2>✨ AI抽出フォーマットの作成</h2>
                <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px;">
                    <p style="font-size: 0.85rem; color: var(--text-color); opacity: 0.8;">抽出したい項目を追加し、それぞれの属性（タグ化やカスタム変数など）を設定してください。</p>
                    
                    <!-- Builder Container -->
                    <div id="format-items-list" style="display: flex; flex-direction: column; gap: 12px;">
                        <!-- JavaScriptで動的に項目が追加されます -->
                    </div>
                    
                    <button id="add-format-item-btn" class="btn text" style="align-self: flex-start; margin-top: 4px; padding: 6px 12px; border: 1px dashed var(--border-color);">+ 項目を追加</button>
                    
                    <div style="margin-top: 12px; display: flex; justify-content: flex-end;">
                        <button id="generate-format-btn" class="btn primary">フォーマット生成</button>
                    </div>
                </div>
                <div style="position: relative;">
                    <textarea id="format-output" readonly placeholder="生成されたプロンプトがここに表示されます。コピーしてAIに貼り付けてください。" style="height: 100px; background: var(--bg-alt);"></textarea>
                    <button id="copy-format-btn" class="btn primary" style="position: absolute; right: 12px; bottom: 28px; width: auto; font-size: 0.85rem; padding: 6px 12px;">コピー</button>
                </div>
            </section>

            <!-- Data Import Section -->
            <section class="glass-card import-section" style="margin-bottom: 24px;">
                <h2>AIテキストインポート</h2>
                <p>AIが出力したMarkdownテーブルを貼り付けてください。メタデータとタグが自動で処理されます。</p>
                <textarea id="import-text" placeholder="| 項目 | 調査結果 |&#10;| --- | --- |&#10;| 企業名 | トヨタ自動車九州 |..."></textarea>
                <div style="display: flex; align-items: center;">
                    <button id="import-btn" class="btn primary" style="width: auto;">データ登録</button>
                    <button id="clear-data-btn" class="btn text" style="color: var(--danger); margin-left: 16px;">全データをクリア (リセット)</button>
                </div>
                <div id="import-status"></div>
            </section>

            <!-- Calendar Section -->
            <section class="glass-card" style="margin-bottom: 24px; display: none;" id="calendar-section">
                <h2>カレンダー (締切日 / 面談日)</h2>
                <div id='calendar' style="margin-top: 16px; background: rgba(15,23,42,0.5); padding: 16px; border-radius: 8px;"></div>
            </section>

            <!-- Search & Filter Section -->
            <section class="glass-card search-section" style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h2 style="margin:0; font-size: 1.1rem;">🔎 高度な条件検索 (クエリビルダー)</h2>
                    <label style="cursor: pointer; font-size: 0.85rem;"><input type="checkbox" id="search-include-hidden"> 非表示も含める</label>
                </div>
                
                <div id="query-builder-container" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; background: var(--bg-alt); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);">
                    <!-- JavaScriptで検索条件の行が追加されます -->
                </div>
                
                <div style="display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 12px;">
                    <button id="add-query-row-btn" class="btn text" style="padding: 6px 12px; border: 1px dashed var(--border-color);">+ 条件を追加</button>
                    <button id="do-query-search-btn" class="btn primary" style="width: auto; padding: 0 20px;">検索実行</button>
                    <button id="clear-search-btn" class="btn secondary" style="width: auto;">クリア</button>
                    
                    <div style="flex: 1;"></div>
                    
                    <!-- DBMS Sort -->
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label style="font-size: 0.85rem; color: var(--text-color);">並び替え:</label>
                        <select id="sort-select" style="padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color);">
                            <option value="created_desc">登録日が新しい順</option>
                            <option value="star_desc">志望度 (星) が高い順</option>
                            <option value="salary_desc">初任給・基本給が高い順</option>
                            <option value="years_desc">勤続年数が長い順</option>
                            <option value="deadline_asc">締切日が近い順</option>
                        </select>
                        <button id="apply-sort-btn" class="btn primary" style="width: auto; padding: 8px 12px;">適用</button>
                    </div>
                </div>
                <!-- Quick Tags -->
                <div id="quick-tags-container" style="display: flex; flex-wrap: wrap; gap: 8px;">
                    <!-- Auto-generated tags will appear here -->
                </div>
            </section>

            <!-- Dashboard / Table View -->
            <section class="dashboard-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <h2>企業リスト DBMS</h2>
                        <label style="font-size: 0.85rem; color: var(--text-muted); cursor: pointer;">
                            <input type="checkbox" id="show-hidden-checkbox"> 非表示(アーカイブ)にした企業も表示
                        </label>
                        <button id="manage-hidden-columns-btn" class="btn text" style="font-size: 0.85rem; padding: 4px 8px;">隠した列を管理</button>
                    </div>
                    <div>
                        <button id="toggle-calendar-btn" class="btn text" style="margin-right: 8px;">📅 カレンダー表示</button>
                        <button id="excel-mode-btn" class="btn primary" style="width: auto; background: var(--success); color: #fff;">エクセルモード(全画面)</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="companies-table">
                        <thead>
                            <tr id="table-head">
                                <!-- Dynamically generated headers -->
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Dynamically generated rows -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="app.js"></script>

    <!-- Edit Cell Modal -->
    <div id="edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-card" style="width: 600px; max-width: 95%;">
            <div class="modal-header">
                <h3 id="edit-modal-title">セルの編集</h3>
                <button class="icon-btn" onclick="document.getElementById('edit-modal').style.display='none'">✕</button>
            </div>
            <div class="modal-body">
                <textarea id="edit-modal-textarea" style="width: 100%; height: 250px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-alt); color: var(--text-color); resize: vertical; line-height: 1.6;"></textarea>
                <div style="margin-top: 16px; display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="btn secondary" onclick="document.getElementById('edit-modal').style.display='none'">キャンセル</button>
                    <button id="edit-modal-save-btn" class="btn primary">保存</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
